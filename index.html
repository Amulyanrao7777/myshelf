  const urlParams = new URLSearchParams(window.location.search);
  const shareParam = urlParams.get("share");
  if (shareParam) {
    try {
      // Try TextDecoder first (handles UTF-8 correctly)
      let data;
      try {
        const binary = atob(shareParam);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        data = JSON.parse(new TextDecoder().decode(bytes));
      } catch(e1) {
        // Fallback
        data = JSON.parse(decodeURIComponent(escape(atob(shareParam))));
      }
      if (!data || typeof data !== "object") throw new Error("invalid share data");
      return <SharePage data={data}/>;
    } catch(e) {
      // invalid share param, fall through to normal app
    }
  }

  const [books, setBooks] = useState(load);
  const [seriesVibes, setSeriesVibes] = useState(loadSV);
  const [bootSynced, setBootSynced] = useState(false);
  const [bootPullDone, setBootPullDone] = useState(false); // guard: no push until pull completes

  // ── INIT SYNC PILL ON STARTUP ────────────────────────────────────────────
  useEffect(()=>{
    if (syncConfig) { setSyncPillStatus("idle"); setSyncPillMsg("connected"); }
  }, []);

  // ── LOCALSTORAGE HEALTH CHECK ──────────────────────────────────────────────
  // On mount, verify localStorage is readable and warn if storage seems lost
  useEffect(()=>{
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored === null && !loadSyncConfig()) {
      // No data and no sync config — fresh install, totally fine
      return;
    }
    if (stored === null && loadSyncConfig()) {
      // Had sync config but lost localStorage — data will be recovered from cloud
      console.warn("localStorage appears cleared — will recover from cloud");
      return;
    }
    try {
      const parsed = JSON.parse(stored);
      if (!Array.isArray(parsed)) {
        console.error("localStorage data corrupt — resetting to []");
        localStorage.setItem(STORAGE_KEY, "[]");
      }
    } catch(e) {
      console.error("localStorage parse failed — resetting:", e);
      localStorage.setItem(STORAGE_KEY, "[]");
    }
  }, []);
  const [view, setView] = useState("shelf");
  const [activeId, setActiveId] = useState(null);
  const [activeSeries, setActiveSeries] = useState(null);
  const [draft, setDraft] = useState(null);
  const [isEditing, setIsEditing] = useState(false);
  const [logDraft, setLogDraft] = useState({ label:"", score:"", note:"" });
  const [editShiftsOpen, setEditShiftsOpen] = useState(false);
  const [charDraft, setCharDraft] = useState({ name:"", score:"", note:"" });
  const [shareOpen, setShareOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterGenre, setFilterGenre] = useState("all");
  const [sortBy, setSortBy] = useState("none");
  const [topN, setTopN] = useState(5);
  const [syncConfig, setSyncConfig] = useState(loadSyncConfig);
  const [syncSetupOpen, setSyncSetupOpen] = useState(false);
  const [syncStatus, setSyncStatus] = useState(null);
  // "idle" | "syncing" | "error" | "offline" — drives the home-page pill
  const [syncPillStatus, setSyncPillStatus] = useState(null); // null = hidden (no sync configured)
  const [syncPillMsg, setSyncPillMsg] = useState("");
  const [search, setSearch] = useState("");
  const [shareLinkBook, setShareLinkBook] = useState(null); // book being shared as link
  const [dragOrder, setDragOrder] = useState(loadDragOrder); // custom order array of book ids, persisted
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const coverRef = useRef();
  const menuRef = useRef();

  useEffect(()=>{
    if (!menuOpen) return;
    const handler = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [menuOpen]);

  // Save to local storage
  useEffect(()=>{ save(books); }, [books]);
  useEffect(()=>{ saveSV(seriesVibes); }, [seriesVibes]);

  // ── AUTO-PULL ON STARTUP ──────────────────────────────────────────────────
  // On first load, if sync is configured, pull from cloud and merge with local.
  // This ensures changes made on another device are picked up immediately.
  useEffect(()=>{
    if (!syncConfig || bootSynced) return;
    setBootSynced(true);
    const cfg = syncConfig;
    if (!navigator.onLine) {
      setSyncPillStatus("offline"); setSyncPillMsg("offline");
      setBootPullDone(true); // allow push when back online
      return;
    }
    setSyncPillStatus("syncing"); setSyncPillMsg("checking…");
    showBanner("checking for updates…");
    syncFromCloud(cfg).then(remote => {
      if (!remote || !remote.books) {
        showBanner("no cloud data found", 2000);
        console.warn("Boot sync: empty response", remote);
        setSyncPillStatus("idle"); setSyncPillMsg("up to date");
        return;
      }
      console.log("Boot sync: got", remote.books.length, "books from cloud");
      if (remote.books.length === 0) {
        showBanner("cloud is empty — your local data is safe", 2500);
        setSyncPillStatus("idle"); setSyncPillMsg("up to date");
        return;
      }
      setBooks(prev => {
        const merged = mergeBooks(prev, remote.books);
        save(merged);
        return merged;
      });
      setSeriesVibes(prev => {
        const merged = mergeSeries(prev, remote.seriesVibes);
        saveSV(merged);
        return merged;
      });
      showBanner("synced ✓ (" + remote.books.length + " from cloud)", 2000);
      setSyncPillStatus("idle"); setSyncPillMsg("synced just now");
    }).catch(e => {
      showBanner("sync failed — " + e.message, 3500);
      console.error("Boot sync error:", e);
      setSyncPillStatus(navigator.onLine === false ? "offline" : "error");
      setSyncPillMsg(navigator.onLine === false ? "offline" : "sync failed");
    }).finally(()=>{
      setBootPullDone(true); // allow auto-push now
    });
  }, [syncConfig]);

  // Refs so debounced sync always sees latest state
  const booksRef = useRef(books);
  const seriesVibesRef = useRef(seriesVibes);
  const syncConfigRef = useRef(syncConfig);
  useEffect(()=>{ booksRef.current = books; }, [books]);
  useEffect(()=>{ seriesVibesRef.current = seriesVibes; }, [seriesVibes]);
  useEffect(()=>{ syncConfigRef.current = syncConfig; }, [syncConfig]);

  const syncTimer = useRef(null);
  const isSyncingRef = useRef(false);
  // Cleanup sync timer on unmount to prevent setState-after-unmount
  useEffect(()=>{ return ()=>clearTimeout(syncTimer.current); }, []);
  useEffect(()=>{
    if (!syncConfig) return;
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(async ()=>{
      const cfg = syncConfigRef.current;
      if (!cfg) return;
      if (isSyncingRef.current) { console.warn("Auto-sync skipped: push already in flight"); return; }
      // SAFETY 1: never push until we've pulled from cloud on startup
      if (syncConfig && !bootPullDone) {
        console.warn("Auto-sync skipped: waiting for boot pull to complete");
        return;
      }
      // SAFETY 2: never push empty books to cloud — would wipe everyone's data
      if (!booksRef.current || booksRef.current.length === 0) {
        console.warn("Auto-sync skipped: local books is empty, not overwriting cloud");
        return;
      }
      isSyncingRef.current = true;
      setSyncPillStatus("syncing"); setSyncPillMsg("saving…");
      try {
        await syncToCloud(cfg, booksRef.current, seriesVibesRef.current);
        showBanner("synced ✓", 1500);
        setSyncPillStatus("idle"); setSyncPillMsg("saved just now");
      } catch(e) {
        showBanner("sync failed — " + e.message, 3500);
        setSyncPillStatus(navigator.onLine === false ? "offline" : "error");
        setSyncPillMsg(navigator.onLine === false ? "offline" : "sync failed");
      } finally {
        isSyncingRef.current = false;
      }
    }, 1200);
  }, [books, seriesVibes]);

  const showBanner = (msg, hide=0) => {
    const b = document.getElementById("sync-banner");
    if (!b) return;
    b.textContent = msg; b.classList.add("show");
    if (hide) setTimeout(()=>b.classList.remove("show"), hide);
  };

  const pullFromCloud = async () => {
    if (!syncConfig) return;
    if (isSyncingRef.current) { showBanner("sync already in progress…", 1500); return; }
    isSyncingRef.current = true;
    setSyncPillStatus("syncing"); setSyncPillMsg("pulling…");
    showBanner("pulling from cloud…");
    try {
      const remote = await syncFromCloud(syncConfig);
      if (!remote || !remote.books || remote.books.length === 0) {
        showBanner("no data found in cloud", 2500);
        setSyncPillStatus("idle"); setSyncPillMsg("up to date");
        return;
      }
      // Merge without triggering auto-push: update refs directly before state
      const mergedBooks = mergeBooks(booksRef.current, remote.books);
      const mergedSeries = mergeSeries(seriesVibesRef.current, remote.seriesVibes);
      save(mergedBooks); saveSV(mergedSeries);
      booksRef.current = mergedBooks;
      seriesVibesRef.current = mergedSeries;
      setBooks(mergedBooks);
      setSeriesVibes(mergedSeries);
      showBanner("pulled ✓ (" + remote.books.length + " from cloud)", 2500);
      setSyncPillStatus("idle"); setSyncPillMsg("synced just now");
    } catch(e) {
      showBanner("pull failed — " + e.message, 3500);
      setSyncPillStatus(navigator.onLine === false ? "offline" : "error");
      setSyncPillMsg(navigator.onLine === false ? "offline" : "pull failed");
      console.error("Pull error:", e);
    } finally {
      isSyncingRef.current = false;
    }
  };

  const active = books.find(b=>b.id===activeId);
  const upd = (id,fn) => setBooks(bs=>bs.map(b=>b.id===id?{...fn(b),updatedAt:Date.now(),_v:10}:b));
  const go = (v, extra={}) => {
    if(extra.id) setActiveId(extra.id);
    if(extra.series) setActiveSeries(extra.series);
    setView(v);
    setMenuOpen(false);
    setShareOpen(false);  // always close share on navigation
    window.scrollTo(0,0);
  };

  const exportJSON = () => {
    try {
      const blob = new Blob([JSON.stringify(books,null,2)],{type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download="my_shelf.json"; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 30000);
    } catch(e) { showBanner("export failed — " + (e.message||"unknown error"), 3000); }
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        if (!ev.target || !ev.target.result) { showBanner("import failed — empty file", 2500); return; }
        const imported = JSON.parse(ev.target.result);
        if (!Array.isArray(imported)) { showBanner("import failed — expected JSON array", 2500); return; }
        if (imported.length === 0) { showBanner("import file is empty", 2500); return; }
        // Use mergeBooks so updated books overwrite stale ones (not silently skipped)
        setBooks(prev => {
          const merged = mergeBooks(prev, imported);
          save(merged);
          return merged;
        });
        showBanner("imported " + imported.length + " books ✓", 2500);
      } catch(e) { showBanner("import failed — " + (e.message||"invalid file"), 2500); }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const genres = [...new Set(books.map(b=>b.genre).filter(Boolean))];

  // ── SHELF ──────────────────────────────────────────────────────────────────
  if (view==="shelf") {
    const currentlyReading = books.filter(b=>b.status==="reading");

    // Apply drag order if set
    let orderedBooks = dragOrder
      ? [...dragOrder.map(id=>books.find(b=>b.id===id)).filter(Boolean), ...books.filter(b=>!dragOrder.includes(b.id))]
      : [...books];

    let displayBooks = [...orderedBooks];
    if (filterStatus!=="all") displayBooks = displayBooks.filter(b=>b.status===filterStatus);
    if (filterGenre!=="all")  displayBooks = displayBooks.filter(b=>b.genre===filterGenre);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      displayBooks = displayBooks.filter(b =>
        b.title.toLowerCase().includes(q) ||
        b.author.toLowerCase().includes(q) ||
        (b.seriesName||"").toLowerCase().includes(q)
      );
    }
    if (sortBy==="rating") displayBooks.sort((a,b)=>(finalScore(b)||0)-(finalScore(a)||0));
    if (sortBy==="genre")  displayBooks.sort((a,b)=>(a.genre||"").localeCompare(b.genre||""));

    const handleDragStart = (e, idx) => {
      setDragIdx(idx);
      e.dataTransfer.effectAllowed = "move";
    };
    const handleDragOver = (e, idx) => {
      e.preventDefault();
      setDragOverIdx(idx);
    };
    const handleDrop = (e, idx) => {
      e.preventDefault();
      if (dragIdx === null || dragIdx === idx) { setDragIdx(null); setDragOverIdx(null); return; }
      if (dragIdx < 0 || dragIdx >= displayBooks.length || idx < 0 || idx >= displayBooks.length) {
        setDragIdx(null); setDragOverIdx(null); return;
      }
      const ids = displayBooks.map(b=>b.id);
      const moved = ids.splice(dragIdx, 1)[0];
      ids.splice(idx, 0, moved);
      setDragOrder(ids);
      saveDragOrder(ids);
      setDragIdx(null); setDragOverIdx(null);
    };

    return (
    <div style={pageStyle} className="fade-in">
      <div style={wrapStyle()}>
        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <Logo size={34}/>
            <h1 className="serif" style={{ fontSize:28, color:C.text, margin:0, fontWeight:700, letterSpacing:"-0.01em" }}>my shelf</h1>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {syncConfig && (
              <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                <button onClick={pullFromCloud} title="Pull latest from cloud"
                  style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:8, color:C.muted, cursor:"pointer", fontSize:15, padding:"3px 10px" }}
                  className="">
                  <span className={syncPillStatus === "syncing" ? "sync-cloud-spinning" : ""} style={{ display:"inline-block" }}>↻</span></button>
                <CloudIndicator status={syncPillStatus}/>
              </div>
            )}
            <button onClick={()=>go("stats")} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:13, padding:"4px 8px" }}>stats</button>
            <div style={{ position:"relative" }} ref={menuRef}>
              <button onClick={()=>setMenuOpen(m=>!m)} style={{ background:"none", border:`1px solid ${C.border}`, borderRadius:8, color:C.muted, cursor:"pointer", fontSize:18, padding:"2px 10px", lineHeight:1.4 }}>· · ·</button>
              {menuOpen && (
                <div style={{ position:"absolute", right:0, top:38, background:C.bg, border:`1px solid ${C.border}`, borderRadius:12, padding:10, zIndex:10, minWidth:200, boxShadow:"0 4px 20px rgba(0,0,0,0.12)" }}>
                  <div style={{ fontSize:10, color:C.muted, padding:"4px 10px 2px", letterSpacing:"0.08em", textTransform:"uppercase" }}>Status</div>
                  {["all",...STATUSES].map(s=>(
                    <button key={s} onClick={()=>{setFilterStatus(s);setMenuOpen(false);}}
                      style={{ display:"flex", alignItems:"center", gap:8, width:"100%", textAlign:"left", background:"none", border:"none", color:filterStatus===s?C.accent:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6, fontWeight:filterStatus===s?600:400 }}>
                      {filterStatus===s && <span style={{ fontSize:10 }}>✓</span>}{s==="all"?"all statuses":s}
                    </button>
                  ))}
                  {genres.length>0 && <>
                    <div style={{ fontSize:10, color:C.muted, padding:"8px 10px 2px", letterSpacing:"0.08em", textTransform:"uppercase" }}>Genre</div>
                    {["all",...genres].map(g=>(
                      <button key={g} onClick={()=>{setFilterGenre(g);setMenuOpen(false);}}
                        style={{ display:"flex", alignItems:"center", gap:8, width:"100%", textAlign:"left", background:"none", border:"none", color:filterGenre===g?C.accent:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6, fontWeight:filterGenre===g?600:400 }}>
                        {filterGenre===g && <span style={{ fontSize:10 }}>✓</span>}{g==="all"?"all genres":g}
                      </button>
                    ))}
                  </>}
                  <div style={{ fontSize:10, color:C.muted, padding:"8px 10px 2px", letterSpacing:"0.08em", textTransform:"uppercase" }}>Sort</div>
                  {[["none","default"],["rating","by rating"],["genre","by genre"]].map(([val,label])=>(
                    <button key={val} onClick={()=>{setSortBy(val);setMenuOpen(false);}}
                      style={{ display:"flex", alignItems:"center", gap:8, width:"100%", textAlign:"left", background:"none", border:"none", color:sortBy===val?C.accent:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6, fontWeight:sortBy===val?600:400 }}>
                      {sortBy===val && <span style={{ fontSize:10 }}>✓</span>}{label}
                    </button>
                  ))}
                  <div style={{ borderTop:`1px solid ${C.border}`, margin:"8px 0 4px" }}/>
                  <button onClick={()=>{ exportJSON(); setMenuOpen(false); }} style={{ display:"block", width:"100%", textAlign:"left", background:"none", border:"none", color:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6 }}>export JSON</button>
                  <label style={{ display:"block", width:"100%", textAlign:"left", color:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6 }}>
                    import JSON
                    <input type="file" accept=".json" onChange={importJSON} style={{ display:"none" }}/>
                  </label>
                  <button onClick={()=>{ setSyncSetupOpen(true); setMenuOpen(false); }}
                    style={{ display:"block", width:"100%", textAlign:"left", background:"none", border:"none", color:syncConfig?C.accent:C.text, fontSize:13, padding:"7px 12px", cursor:"pointer", borderRadius:6, fontWeight:syncConfig?600:400 }}>
                    {syncConfig?"✦ sync connected":"set up sync"}
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Search */}
        <div style={{ marginBottom:16, position:"relative" }}>
          <span style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", fontSize:14, color:C.muted, pointerEvents:"none" }}>◌</span>
          <input
            value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="search titles, authors, series…"
            style={{ ...inp, paddingLeft:32, background:C.warm }}/>
        </div>

        {syncConfig && (
          <div style={{ fontSize:11, color:C.muted, marginBottom:14 }}>
            syncing as <strong style={{color:C.accent}}>{syncConfig.userId}</strong>
          </div>
        )}

        {/* Currently Reading — pinned section */}
        {currentlyReading.length > 0 && !search && filterStatus==="all" && (
          <div style={{ marginBottom:22 }}>
            <div style={{ fontSize:11, color:C.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:10, fontWeight:600 }}>currently reading</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {currentlyReading.map(b=>{
                const read = getActiveRead(b);
                const fs = finalScoreForRead(read);
                return (
                  <div key={b.id} onClick={()=>go("book",{id:b.id})}
                    style={{ ...sectionStyle, cursor:"pointer", display:"flex", gap:12, alignItems:"center", marginBottom:0, borderLeft:`3px solid ${C.accentL}` }}>
                    {b.cover
                      ? <img src={b.cover} alt="" style={{ width:44, height:60, objectFit:"cover", borderRadius:6, flexShrink:0 }}/>
                      : <div style={{ width:44, height:60, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><BookArt size={34}/></div>}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div className="serif" style={{ fontSize:14, fontWeight:700, color:C.text, marginBottom:1 }}>{b.title}</div>
                      <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>{b.author}</div>
                      {b.startDate && <div style={{ fontSize:10, color:C.muted }}>started {b.startDate}</div>}
                    </div>
                    {fs!==null && <span className="serif" style={{ fontSize:22, fontWeight:700, color:C.accent, flexShrink:0 }}>{fs.toFixed(b.decimals||2)}</span>}
                  </div>
                );
              })}
            </div>
            <div style={{ borderBottom:`1px solid ${C.border}`, marginTop:18, marginBottom:18 }}/>
          </div>
        )}

        {!books.length ? (
          <div style={{ textAlign:"center", padding:"56px 0 40px" }}>
            <Logo size={72}/>
            <div style={{ fontSize:15, color:C.muted, marginTop:16, marginBottom:6 }}>your shelf is empty</div>
            <div style={{ fontSize:12, color:C.muted }}>add your first book below</div>
          </div>
        ) : displayBooks.length === 0 ? (
          <div style={{ textAlign:"center", padding:"40px 0", color:C.muted, fontSize:14 }}>no books match your search</div>
        ) : (
          <div className="book-grid" style={{ marginBottom:20 }}>
            {displayBooks.map((b,idx)=>{
              const read = getActiveRead(b);
              const fs = finalScoreForRead(read);
              const finished = b.status==="finished";
              const isDragging = dragIdx === idx;
              const isOver = dragOverIdx === idx;
              return (
                <div key={b.id}
                  onDragOver={e=>handleDragOver(e,idx)}
                  onDrop={e=>handleDrop(e,idx)}
                  onDragEnd={()=>{ setDragIdx(null); setDragOverIdx(null); }}
                  style={{ ...sectionStyle, cursor:"default", position:"relative", overflow:"hidden", padding:"14px 12px", marginBottom:0,
                    opacity: isDragging ? 0.4 : 1,
                    boxShadow: isOver ? `0 0 0 2px ${C.accent}` : "none",
                    transition:"box-shadow 0.15s, opacity 0.15s" }}>
                  {/* Invisible drag handle — left edge strip */}
                  <div draggable
                    onDragStart={e=>{ e.stopPropagation(); handleDragStart(e,idx); }}
                    style={{ position:"absolute", left:0, top:0, width:10, height:"100%", cursor:"grab", zIndex:3 }}/>
                  {finished && <div style={{ position:"absolute", top:10, right:-18, width:80, textAlign:"center", background:C.accentL, color:C.white, fontSize:9, fontWeight:700, letterSpacing:"0.05em", padding:"3px 0", transform:"rotate(35deg)", zIndex:2 }}>READ</div>}
                  {b.reads && b.reads.length > 1 && (
                    <div style={{ position:"absolute", top:8, left:8, background:C.accent, color:C.white, fontSize:8, fontWeight:700, borderRadius:10, padding:"1px 6px", zIndex:2 }}>·{b.reads.length}×</div>
                  )}
                  <div onClick={()=>go("book",{id:b.id})}>
                    {b.cover
                      ? <img src={b.cover} alt="" style={{ width:"100%", height:80, objectFit:"cover", borderRadius:8, marginBottom:10 }}/>
                      : <div style={{ width:"100%", height:54, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:6 }}><BookArt size={38}/></div>}
                    <div className="serif" style={{ fontSize:13, fontWeight:700, color:C.text, marginBottom:2, lineHeight:1.3 }}>{b.title||"Untitled"}</div>
                    <div style={{ fontSize:11, color:C.muted, marginBottom:6 }}>{b.author}</div>
                  </div>
                  {b.seriesName && (
                    <div onClick={()=>go("series",{series:b.seriesName})}
                      style={{ display:"inline-block", fontSize:10, color:C.accent, background:C.bg, border:`1px solid ${C.accentL}`, borderRadius:20, padding:"2px 8px", marginBottom:6, cursor:"pointer" }}>
                      {b.seriesName}{b.seriesNum?` #${b.seriesNum}`:""}
                    </div>
                  )}
                  <div onClick={()=>go("book",{id:b.id})}>
                    <div style={{ marginTop:6, display:"flex", justifyContent:"space-between", alignItems:"flex-end" }}>
                      {fs!==null
                        ? <span className="serif" style={{ fontSize:24, fontWeight:700, color:C.accent, lineHeight:1 }}>{fs.toFixed(b.decimals||2)}<span style={{ fontSize:10, color:C.muted, fontWeight:400 }}>/5</span></span>
                        : <span style={{ fontSize:12, color:C.muted }}>unrated</span>}
                      <span style={{ fontSize:10, color:C.muted, background:C.border, padding:"2px 6px", borderRadius:20 }}>{b.status}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <button onClick={()=>{ setDraft(emptyBook()); setIsEditing(false); go("add"); }} style={ghostBtn(C.accentL)}>+ add a book</button>
      </div>
      {syncSetupOpen && <SyncSetup existing={syncConfig} onSave={cfg=>{ saveSyncConfig(cfg); setSyncConfig(cfg); setSyncSetupOpen(false); if (cfg) { setSyncPillStatus("idle"); setSyncPillMsg("connected"); } else { setSyncPillStatus(null); setSyncPillMsg(""); } }} onClose={()=>setSyncSetupOpen(false)}/>}
      {shareLinkBook && <ShareLinkModal book={shareLinkBook} onClose={()=>setShareLinkBook(null)}/>}
    </div>
  );
  }

  // ── ADD / EDIT ─────────────────────────────────────────────────────────────
  if ((view==="add"||view==="edit") && draft) {
    const isEdit = view==="edit";
    return (
      <div style={pageStyle} className="fade-in">
        <div style={wrapStyle(460)}>
          <button onClick={()=>go(isEdit?"book":"shelf")} style={backBtn}>‹ {isEdit?"book":"shelf"}</button>
          <h2 className="serif" style={{ fontSize:22, color:C.text, margin:"0 0 20px", fontWeight:700 }}>{isEdit?"edit book":"add a book"}</h2>
          <Field label="Title" value={draft.title} onChange={v=>setDraft(d=>({...d,title:v}))} placeholder="book title"/>
          <Field label="Author" value={draft.author} onChange={v=>setDraft(d=>({...d,author:v}))} placeholder="author name"/>
          <Field label="Genre" value={draft.genre} onChange={v=>setDraft(d=>({...d,genre:v}))} placeholder="e.g. literary fiction"/>
          <div style={{ display:"flex", gap:10 }}>
            <Field label="Series Name" value={draft.seriesName} onChange={v=>setDraft(d=>({...d,seriesName:v}))} placeholder="e.g. The Expanse" half/>
            <Field label="#" value={draft.seriesNum} onChange={v=>setDraft(d=>({...d,seriesNum:v}))} placeholder="1" half/>
          </div>
          <Field label="Date started" type="date" value={draft.startDate||""} onChange={v=>setDraft(d=>({...d,startDate:v}))} placeholder=""/>
          <Field label="Date finished" type="date" value={draft.finishedDate||""} onChange={v=>setDraft(d=>({...d,finishedDate:v}))} placeholder=""/>
          {/* Cover */}
          <div style={{ marginBottom:16 }}>
            <label style={lbl}>Cover photo</label>
            <input type="file" accept="image/*" ref={coverRef} style={{ display:"none" }} onChange={e=>{
              const file=e.target.files[0]; if(!file) return;
              const r=new FileReader();
              r.onload=ev=>{
                if (!ev.target || !ev.target.result) return;
                const img = new Image();
                img.onload = () => {
                  const MAX = 600;
                  let w = img.width, h = img.height;
                  if (w > MAX || h > MAX) {
                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                    else { w = Math.round(w * MAX / h); h = MAX; }
                  }
                  const canvas = document.createElement("canvas");
                  canvas.width = w; canvas.height = h;
                  const ctx = canvas.getContext("2d");
                  ctx.drawImage(img, 0, 0, w, h);
                  let quality = 0.82;
                  let dataUrl = canvas.toDataURL("image/jpeg", quality);
                  while (dataUrl.length > 300 * 1024 && quality > 0.3) {
                    quality -= 0.1;
                    dataUrl = canvas.toDataURL("image/jpeg", quality);
                  }
                  setDraft(d=>({...d,cover:dataUrl}));
                };
                img.onerror = () => showBanner("cover upload failed — try another image", 3000);
                img.src = ev.target.result;
              };
              r.onerror=()=>showBanner("cover upload failed — try another image", 3000);
              r.readAsDataURL(file);
            }}/>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <button onClick={()=>coverRef.current?.click()} style={{ ...ghostBtn(C.accentL), width:"auto", padding:"8px 16px", fontSize:12 }}>
                {draft.cover?"change cover":"upload cover"}
              </button>
              {draft.cover && <button onClick={()=>setDraft(d=>({...d,cover:null}))} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:12 }}>remove</button>}
              {draft.cover && <img src={draft.cover} alt="" style={{ height:42, borderRadius:6, objectFit:"cover" }}/>}
            </div>
          </div>
          <div style={{ marginBottom:14 }}>
            <label style={lbl}>Status</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {STATUSES.map(st=>(
                <button key={st} onClick={()=>setDraft(d=>({...d,status:st}))} style={{ ...pillStyle(draft.status===st), flex:"none", padding:"7px 12px" }}>{st}</button>
              ))}
            </div>
          </div>
          <div style={{ marginBottom:18 }}>
            <label style={lbl}>Decimal precision</label>
            <div style={{ display:"flex", gap:8 }}>
              {[2,3].map(d=>(
                <button key={d} onClick={()=>setDraft(dr=>({...dr,decimals:d}))} style={pillStyle(draft.decimals===d)}>{d} places</button>
              ))}
            </div>
          </div>
          <button onClick={()=>{
            if(!draft.title.trim()) return;
            if(isEdit){ setBooks(bs=>bs.map(b=>b.id===draft.id?{...draft,updatedAt:Date.now()}:b)); go("book"); }
            else { const nb={...draft,id:genId(),updatedAt:Date.now()}; setBooks(bs=>[...bs,nb]); setActiveId(nb.id); go("shelf"); }
          }} style={primaryBtn}>{isEdit?"save changes":"add to shelf"}</button>
        </div>
      </div>
    );
  }

  // ── BOOK PAGE ──────────────────────────────────────────────────────────────
  if (view==="book" && active) {
    const reads = (active.reads && active.reads.length > 0) ? active.reads : null;
    const activeReadIdx = Math.min(active.activeReadIdx||0, reads ? reads.length-1 : 0);
    const currentRead = reads ? reads[activeReadIdx] : { curve: active.curve||[], pillars: active.pillars||{feeling:"",writing:"",imprint:"",pacing:"",characters:""}, vibe: active.vibe||"" };
    const fs = finalScoreForRead(currentRead);

    const generateShareLink = () => {
      const data = {
        title: active.title, author: active.author, genre: active.genre,
        seriesName: active.seriesName, seriesNum: active.seriesNum,
        pillars: currentRead.pillars, vibe: currentRead.vibe,
        decimals: active.decimals||2,
        score: fs,
      };
      let encoded;
      try {
        const jsonStr = JSON.stringify(data);
        // Use TextEncoder for safe UTF-8 base64 encoding
        if (typeof TextEncoder !== "undefined") {
          const bytes = new TextEncoder().encode(jsonStr);
          let binary = "";
          bytes.forEach(b => binary += String.fromCharCode(b));
          encoded = btoa(binary);
        } else {
          encoded = btoa(unescape(encodeURIComponent(jsonStr)));
        }
      } catch(e) { encoded = ""; console.error("Share encode failed:", e); }
      const url = window.location.href.split('?')[0] + '?share=' + encoded;
      navigator.clipboard.writeText(url).catch(()=>{});
      setShareLinkBook({ ...data, _url: url });
    };

    return (
    <div style={pageStyle} className="fade-in">
      <div style={wrapStyle(520)}>
        <button onClick={()=>go("shelf")} style={backBtn}>‹ shelf</button>
        {active.cover && <img src={active.cover} alt="" style={{ width:"100%", maxHeight:200, objectFit:"cover", borderRadius:14, marginBottom:20 }}/>}
        <div style={{ marginBottom:20 }}>
          {active.seriesName && (
            <div onClick={()=>go("series",{series:active.seriesName})}
              style={{ display:"inline-block", fontSize:11, color:C.accent, background:C.bg, border:`1px solid ${C.accentL}`, borderRadius:20, padding:"3px 10px", marginBottom:10, cursor:"pointer" }}>
              {active.seriesName}{active.seriesNum?` #${active.seriesNum}`:""}
            </div>
          )}
          <h2 className="serif" style={{ fontSize:24, color:C.text, margin:"0 0 4px", fontWeight:700 }}>{active.title}</h2>
          <div style={{ color:C.muted, fontSize:13, marginBottom:2 }}>{active.author}{active.genre?` · ${active.genre}`:""}</div>
{(()=>{
            if (!active.startDate && !active.finishedDate) return null;
            let line = "";
            if (active.startDate) line += "started " + active.startDate;
            if (active.finishedDate) {
              if (line) line += " · ";
              line += "finished " + active.finishedDate;
              if (active.startDate) {
                const ms = new Date(active.finishedDate) - new Date(active.startDate);
                const days = Math.round(ms / (1000*60*60*24));
                if (days > 0) line += " · read in " + days + " day" + (days===1?"":"s");
              }
            }
            return <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>{line}</div>;
          })()}
          {fs!==null && (
            <div style={{ marginTop:10 }}>
              <span className="serif" style={{ fontSize:44, fontWeight:700, color:C.accent, lineHeight:1 }}>{fs.toFixed(active.decimals||2)}</span>
              <span style={{ fontSize:14, color:C.muted, fontWeight:400 }}> / 5</span>
            </div>
          )}
          <div style={{ display:"flex", gap:8, marginTop:14, flexWrap:"wrap" }}>
            <button onClick={()=>{ setDraft({...active}); setIsEditing(true); go("edit"); }} style={{ ...ghostBtn(), width:"auto", padding:"8px 16px", fontSize:12 }}>edit</button>
            <button onClick={()=>setShareOpen(true)} style={{ ...ghostBtn(C.accentL), width:"auto", padding:"8px 16px", fontSize:12 }}>✦ share card</button>
            <button onClick={generateShareLink} style={{ ...ghostBtn(C.accentL), width:"auto", padding:"8px 16px", fontSize:12 }}>↗ link</button>
          </div>
        </div>

        {/* Reread tabs */}
        {reads && reads.length > 0 && (
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:C.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8, fontWeight:600 }}>reads</div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              {reads.map((r,i)=>(
                <button key={r.id} onClick={()=>upd(active.id,b=>({...b,activeReadIdx:i}))}
                  style={{ padding:"6px 14px", borderRadius:20, border:`1px solid ${i===activeReadIdx?C.accent:C.border}`, background:i===activeReadIdx?C.accent:"transparent", color:i===activeReadIdx?C.white:C.muted, fontSize:12, cursor:"pointer", fontWeight:i===activeReadIdx?600:400 }}>
                  {r.label||`Read ${i+1}`}
                </button>
              ))}
              <button onClick={()=>{
                const newRead = emptyRead(`Read ${(reads.length)+1}`);
                upd(active.id, b=>({ ...b, reads:[...(b.reads||[]), newRead], activeReadIdx:(b.reads||[]).length }));
              }} style={{ padding:"6px 12px", borderRadius:20, border:`1px solid ${C.border}`, background:"transparent", color:C.muted, fontSize:12, cursor:"pointer" }}>+ reread</button>
            </div>
          </div>
        )}
        {!reads && (
          <div style={{ marginBottom:14, textAlign:"right" }}>
            <button onClick={()=>{
              // migrate flat data into reads array
              const firstRead = { id: genId(), label:"Read 1", startDate: active.startDate||"", finishedDate: active.finishedDate||"", curve: active.curve||[], pillars: active.pillars||{feeling:"",writing:"",imprint:"",pacing:"",characters:""}, vibe: active.vibe||"", updatedAt: active.updatedAt||Date.now() };
              const newRead = emptyRead("Read 2");
              upd(active.id, b=>({ ...b, reads:[firstRead, newRead], activeReadIdx:1 }));
            }} style={{ background:"none", border:"none", color:C.accentL, cursor:"pointer", fontSize:12 }}>+ log a reread</button>
          </div>
        )}

        <div style={sectionStyle}>
          <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:10, letterSpacing:"0.02em" }}>reading curve
            {reads && <span style={{ fontSize:10, color:C.muted, marginLeft:6 }}>{currentRead.label||`Read ${activeReadIdx+1}`}</span>}
          </div>
          <CurveGraph curve={currentRead.curve||[]}/>
          <div style={{ display:"flex", gap:8, marginTop:12 }}>
            <button onClick={()=>{ setLogDraft({label:"",score:"",note:""}); go("log"); }} style={{ ...ghostBtn(), flex:1 }}>+ log a shift</button>
            <button onClick={()=>setEditShiftsOpen(true)} style={{ ...ghostBtn(C.muted), flex:1 }}>edit shifts</button>
          </div>
        </div>

        <div style={sectionStyle}>
          <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:4, letterSpacing:"0.02em" }}>pillar breakdown
            {reads && <span style={{ fontSize:10, color:C.muted, marginLeft:6 }}>{currentRead.label||`Read ${activeReadIdx+1}`}</span>}
          </div>
          <RadarDisplay book={{ pillars: currentRead.pillars||{}, vibe: currentRead.vibe }}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:6, marginTop:8 }}>
            {PILLARS.map(p=>(
              <div key={p.key} style={{ fontSize:12, color:C.muted }}>{p.label}: <span style={{ color:C.accent, fontWeight:600 }}>{(currentRead.pillars||{})[p.key]||"—"}</span></div>
            ))}
            <div style={{ fontSize:12, color:C.muted }}>Vibe: <span style={{ color:C.accent, fontWeight:600 }}>{currentRead.vibe||"—"}</span></div>
          </div>
          <button onClick={()=>go("rate")} style={{ ...ghostBtn(), marginTop:12 }}>
            {Object.values(currentRead.pillars||{}).some(v=>v!=="")?`edit ratings`:`rate this book`}
          </button>
        </div>

        <div style={sectionStyle}>
          <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:10, letterSpacing:"0.02em" }}>characters</div>
          {(active.characterRatings||[]).map((c,i)=>(
            <div key={i} style={{ padding:"8px 0", borderBottom:`1px solid ${C.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <span style={{ fontSize:14, color:C.text, fontWeight:600 }}>{c.name}</span>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:14, fontWeight:700, color:C.accent }}>{c.score}<span style={{ color:C.muted, fontWeight:400, fontSize:11 }}>/10</span></span>
                  <button onClick={()=>upd(active.id,b=>({...b,characterRatings:b.characterRatings.filter((_,j)=>j!==i)}))}
                    style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:18, lineHeight:1, padding:0 }}>×</button>
                </div>
              </div>
              {c.note && <div style={{ fontSize:12, color:C.muted, marginTop:2, fontStyle:"italic" }}>{c.note}</div>}
            </div>
          ))}
          <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:8 }}>
            <div style={{ display:"flex", gap:8 }}>
              <input value={charDraft.name} onChange={e=>setCharDraft(d=>({...d,name:e.target.value}))} placeholder="Character name"
                style={{ flex:2, padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:13, outline:"none" }}/>
              <input type="number" min={1} max={10} value={charDraft.score} onChange={e=>setCharDraft(d=>({...d,score:e.target.value}))} placeholder="1–10"
                style={{ flex:1, padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:13, outline:"none" }}/>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              <input value={charDraft.note} onChange={e=>setCharDraft(d=>({...d,note:e.target.value}))} placeholder="optional note"
                style={{ flex:1, padding:"8px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:13, outline:"none" }}/>
              <button onClick={()=>{
                if(!charDraft.name.trim()||!charDraft.score) return;
                upd(active.id,b=>({...b,characterRatings:[...(b.characterRatings||[]),{name:charDraft.name.trim(),score:parseFloat(charDraft.score),note:charDraft.note}]}));
                setCharDraft({name:"",score:"",note:""});
              }} style={{ padding:"8px 14px", borderRadius:7, border:"none", background:C.accent, color:C.white, fontSize:13, cursor:"pointer", whiteSpace:"nowrap" }}>add</button>
            </div>
          </div>
        </div>

        <div style={sectionStyle}>
          <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:10, letterSpacing:"0.02em" }}>notes</div>
          <textarea value={active.bookNotes||""} onChange={e=>upd(active.id,b=>({...b,bookNotes:e.target.value}))}
            placeholder="anything you want to remember..."
            style={{ width:"100%", minHeight:100, padding:"10px 12px", borderRadius:8, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:13, outline:"none", resize:"vertical", boxSizing:"border-box", lineHeight:1.6 }}/>
        </div>

        <button onClick={()=>{
          let confirmed = false;
          try { confirmed = window.confirm("Remove this book from your shelf?"); } catch(e) { confirmed = true; }
          if(confirmed) {
            setBooks(bs=>bs.filter(b=>b.id!==active.id));
            go("shelf");
          }
        }} style={ghostBtn(C.danger)}>remove book</button>
      </div>

      {editShiftsOpen && (() => {
        const curve = currentRead.curve||[];
        const updateCurve = (newCurve) => {
          if (reads) upd(active.id,b=>({...b,reads:b.reads.map((r,ri)=>ri===activeReadIdx?{...r,curve:newCurve}:r)}));
          else upd(active.id,b=>({...b,curve:newCurve}));
        };
        let shiftDragIdx = null;
        return (
        <Modal onClose={()=>setEditShiftsOpen(false)}>
          <div style={{ fontWeight:700, fontSize:16, color:C.text, marginBottom:4, fontFamily:"'Playfair Display',serif" }}>edit shifts — {currentRead.label||"Read 1"}</div>
          <div style={{ fontSize:11, color:C.muted, marginBottom:14 }}>drag ≡ to reorder</div>
          {!curve.length && <div style={{ color:C.muted, fontSize:13 }}>No shifts logged yet.</div>}
          {curve.map((pt,i)=>(
            <div key={i} draggable
              onDragStart={e=>{ shiftDragIdx=i; e.dataTransfer.effectAllowed="move"; }}
              onDragOver={e=>e.preventDefault()}
              onDrop={e=>{
                e.preventDefault();
                if (shiftDragIdx===null||shiftDragIdx===i) return;
                const newCurve=[...curve];
                const moved=newCurve.splice(shiftDragIdx,1)[0];
                newCurve.splice(i,0,moved);
                shiftDragIdx=null;
                updateCurve(newCurve);
              }}
              style={{ padding:"10px 0", borderBottom:`1px solid ${C.border}`, cursor:"grab" }}>
              <div style={{ display:"flex", gap:8, marginBottom:6, alignItems:"center" }}>
                <span style={{ color:C.accentL, fontSize:20, cursor:"grab", flexShrink:0, padding:"0 6px 0 2px", lineHeight:1, userSelect:"none" }}>⠿</span>
                <input value={pt.label} onChange={e=>{ const nc=[...curve]; nc[i]={...nc[i],label:e.target.value}; updateCurve(nc); }}
                  placeholder="label" style={{ flex:2, padding:"6px 9px", borderRadius:6, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:12, outline:"none" }}/>
                <input type="number" min={1} max={10} value={pt.score} onChange={e=>{ const nc=[...curve]; nc[i]={...nc[i],score:parseFloat(e.target.value)||pt.score}; updateCurve(nc); }}
                  style={{ flex:1, padding:"6px 9px", borderRadius:6, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:12, outline:"none" }}/>
                <button onClick={()=>updateCurve(curve.filter((_,j)=>j!==i))}
                  style={{ background:"none", border:"none", color:C.amber, cursor:"pointer", fontSize:18, padding:0 }}>×</button>
              </div>
              <input value={pt.note||""} onChange={e=>{ const nc=[...curve]; nc[i]={...nc[i],note:e.target.value}; updateCurve(nc); }}
                placeholder="note (e.g. the confession scene)"
                style={{ width:"100%", padding:"6px 9px", borderRadius:6, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:12, outline:"none", boxSizing:"border-box" }}/>
            </div>
          ))}
          <button onClick={()=>setEditShiftsOpen(false)} style={{ ...primaryBtn, marginTop:16 }}>done</button>
        </Modal>
        );
      })()}

      {shareOpen && <ShareCard book={{ ...active, pillars: currentRead.pillars, vibe: currentRead.vibe }} onClose={()=>setShareOpen(false)}/>}
      {shareLinkBook && <ShareLinkModal book={shareLinkBook} onClose={()=>setShareLinkBook(null)}/>}
    </div>
    );
  }

  // ── LOG SHIFT ──────────────────────────────────────────────────────────────
  if (view==="log" && active) {
    const reads = (active.reads && active.reads.length > 0) ? active.reads : null;
    const activeReadIdx = Math.min(active.activeReadIdx||0, reads ? reads.length-1 : 0);
    const currentCurve = reads ? (reads[activeReadIdx].curve||[]) : (active.curve||[]);
    const readLabel = reads ? (reads[activeReadIdx].label||`Read ${activeReadIdx+1}`) : "Read 1";

    const newScore = parseFloat(logDraft.score);
    const newLabel = logDraft.label.trim();
    const extractChNum = (label) => {
      const s = label.trim();
      const direct = parseFloat(s);
      if (!isNaN(direct) && s.match(/^[\d.]+$/)) return direct;
      const m = s.match(/^ch(?:apter)?\s*([\d.]+)/i);
      return m ? parseFloat(m[1]) : null;
    };
    const newChNum = extractChNum(newLabel);
    const isChapterPoint = newChNum !== null && newChNum >= 1;
    const existingAnchors = currentCurve
      .map((pt,i)=>({...pt,idx:i,chNum:extractChNum(pt.label)}))
      .filter(pt=>pt.chNum!==null && !pt.interpolated);

    const buildInterpolated = (anchors) => {
      const sorted = [...anchors].sort((a,b)=>a.chNum-b.chNum);
      if (sorted.length < 2) return [];
      const result = [];
      for (let i = 0; i < sorted.length-1; i++) {
        const a=sorted[i], b=sorted[i+1];
        const steps=Math.round(b.chNum-a.chNum);
        // Hold the previous anchor's score until the next anchor (step curve)
        for (let s=1; s<steps; s++) {
          const ch=a.chNum+s;
          result.push({label:String(ch),score:a.score,note:"",interpolated:true});
        }
      }
      return result;
    };

    let previewInterpolated = [];
    if (isChapterPoint && !isNaN(newScore)) {
      const newAnchor = {chNum:newChNum,score:newScore,label:newLabel||`Ch ${newChNum}`};
      previewInterpolated = buildInterpolated([...existingAnchors,newAnchor]);
    }

    const doLog = () => {
      if (!logDraft.score) return;
      const rawScore = clampNum(logDraft.score,1,10);
      if (isNaN(rawScore)) return;
      const score = parseFloat(rawScore);
      const label = newLabel || `pt ${currentCurve.length+1}`;
      const newAnchor = {label,score,note:logDraft.note,anchor:isChapterPoint};

      const buildNewCurve = (existingCurve) => {
        // Clean up anchor label — just the number, not "Ch 8"
        const cleanedAnchor = isChapterPoint
          ? {...newAnchor, label: String(newChNum % 1 === 0 ? Math.round(newChNum) : newChNum)}
          : newAnchor;
        const withNew = [...existingCurve, cleanedAnchor];
        if (!isChapterPoint) return withNew;
        const anchors = withNew
          .filter(pt=>{ const cn=extractChNum(pt.label); return cn!==null&&!pt.interpolated; })
          .map(pt=>({...pt,chNum:extractChNum(pt.label)}))
          .sort((a,b)=>a.chNum-b.chNum);
        // Keep non-interpolated points in their original logged order
        const nonInterp = withNew.filter(pt=>!pt.interpolated);
        const interpolated = buildInterpolated(anchors);
        // Merge interpolated chapters INTO the numeric positions between anchors,
        // but freeform points (no chapter number) stay exactly where they were logged
        const result = [];
        let interpIdx = 0;
        for (let i = 0; i < nonInterp.length; i++) {
          const pt = nonInterp[i];
          const cn = extractChNum(pt.label);
          const nextPt = nonInterp[i+1];
          const nextCn = nextPt ? extractChNum(nextPt.label) : null;
          result.push(pt);
          // insert interpolated points that fall between this anchor and the next
          if (cn !== null && nextCn !== null) {
            while (interpIdx < interpolated.length) {
              const ic = extractChNum(interpolated[interpIdx].label);
              if (ic !== null && ic > cn && ic < nextCn) {
                result.push(interpolated[interpIdx]);
                interpIdx++;
              } else break;
            }
          }
        }
        // append any remaining interpolated points after the last anchor
        while (interpIdx < interpolated.length) {
          result.push(interpolated[interpIdx++]);
        }
        return result;
      };

      if (reads) {
        upd(active.id,b=>({...b,reads:b.reads.map((r,ri)=>ri===activeReadIdx?{...r,curve:buildNewCurve(r.curve||[])}:r)}));
      } else {
        upd(active.id,b=>({...b,curve:buildNewCurve(b.curve||[])}));
      }
      go("book");
    };

    return (
      <div style={pageStyle} className="fade-in">
        <div style={wrapStyle(420)}>
          <button onClick={()=>go("book")} style={backBtn}>‹ back</button>
          <h2 className="serif" style={{ fontSize:22, color:C.text, margin:"0 0 6px", fontWeight:700 }}>log a shift</h2>
          <div style={{ color:C.muted, fontSize:13, marginBottom:20 }}>{active.title} · <span style={{color:C.accentL}}>{readLabel}</span></div>
          <div style={{ marginBottom:13 }}>
            <label style={lbl}>Chapter or moment</label>
            <input value={logDraft.label} onChange={e=>setLogDraft(d=>({...d,label:e.target.value}))}
              placeholder="e.g. 8, Ch 21, dedication, the twist…" style={inp}/>
            <div style={{ fontSize:11, color:C.muted, marginTop:4 }}>Use a number or "Ch 8" to auto-interpolate between anchors. Anything else is a freeform point.</div>
          </div>
          <Field label="Note (optional)" value={logDraft.note} onChange={v=>setLogDraft(d=>({...d,note:v}))} placeholder="e.g. the confession scene"/>
          <div style={{ marginBottom:22 }}>
            <label style={lbl}>Score at this point (1–10)</label>
            <input type="number" min={1} max={10} step={0.5} value={logDraft.score}
              onChange={e=>setLogDraft(d=>({...d,score:e.target.value}))} placeholder="1–10"
              style={{ ...inp, fontSize:22, padding:"12px 14px" }}/>
          </div>
          {isChapterPoint && !isNaN(newScore) && newScore>=1 && existingAnchors.length>0 && previewInterpolated.length>0 && (
            <div style={{ ...sectionStyle, marginBottom:16 }}>
              <div style={{ fontWeight:600, color:C.text, fontSize:13, marginBottom:6 }}>Auto-fill preview ✦</div>
              <div style={{ fontSize:12, color:C.muted, marginBottom:8 }}>{previewInterpolated.length} chapters interpolated between your anchor points:</div>
              <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                {previewInterpolated.slice(0,10).map((p,i)=>(
                  <span key={i} style={{ fontSize:10, background:C.bg, border:`1px solid ${C.border}`, borderRadius:6, padding:"2px 6px", color:C.muted }}>{p.label}: <span style={{color:C.accent}}>{p.score}</span></span>
                ))}
                {previewInterpolated.length>10 && <span style={{ fontSize:10, color:C.muted }}>…+{previewInterpolated.length-10} more</span>}
              </div>
            </div>
          )}
          <button onClick={doLog} style={primaryBtn}>log it</button>
        </div>
      </div>
    );
  }

  // ── RATE ───────────────────────────────────────────────────────────────────
  if (view==="rate" && active) {
    const reads = (active.reads && active.reads.length > 0) ? active.reads : null;
    const activeReadIdx = Math.min(active.activeReadIdx||0, reads ? reads.length-1 : 0);
    const currentRead = reads ? reads[activeReadIdx] : { pillars: active.pillars||{feeling:"",writing:"",imprint:"",pacing:"",characters:""}, vibe: active.vibe||"" };
    const readLabel = reads ? (reads[activeReadIdx].label||`Read ${activeReadIdx+1}`) : null;
    const fs = finalScoreForRead(currentRead);

    const updPillar = (key, v) => {
      if (reads) upd(active.id,b=>({...b,reads:b.reads.map((r,ri)=>ri===activeReadIdx?{...r,pillars:{...r.pillars,[key]:v}}:r)}));
      else upd(active.id,b=>({...b,pillars:{...b.pillars,[key]:v}}));
    };
    const updVibe = (v) => {
      if (reads) upd(active.id,b=>({...b,reads:b.reads.map((r,ri)=>ri===activeReadIdx?{...r,vibe:v}:r)}));
      else upd(active.id,b=>({...b,vibe:v}));
    };

    return (
      <div style={pageStyle} className="fade-in">
        <div style={wrapStyle(460)}>
          <button onClick={()=>go("book")} style={backBtn}>‹ back</button>
          <h2 className="serif" style={{ fontSize:22, color:C.text, margin:"0 0 6px", fontWeight:700 }}>rate the pillars</h2>
          <div style={{ color:C.muted, fontSize:13, marginBottom:22 }}>
            {active.title} · each out of 5{readLabel && <span style={{color:C.accentL}}> · {readLabel}</span>}
          </div>
          {PILLARS.map(p=>(
            <ScoreField key={p.key} label={p.label} prompt={p.prompt} max={5}
              value={(currentRead.pillars||{})[p.key]||""} decimals={active.decimals||2}
              onChange={v=>updPillar(p.key,v)}/>
          ))}
          <ScoreField label="Vibe" prompt="Pure gut feeling. No logic. How do you feel about this book right now?" max={5}
            value={currentRead.vibe||""} decimals={active.decimals||2}
            onChange={updVibe}/>
          {fs!==null && (
            <div style={{ textAlign:"center", padding:18, background:C.warm, borderRadius:12, border:`1px solid ${C.border}`, margin:"12px 0" }}>
              <div style={{ fontSize:12, color:C.muted, marginBottom:4, letterSpacing:"0.06em", textTransform:"uppercase" }}>final score</div>
              <div className="serif" style={{ fontSize:42, fontWeight:700, color:C.accent }}>{fs.toFixed(active.decimals||2)}<span style={{ fontSize:16, color:C.muted, fontWeight:400 }}> / 5</span></div>
            </div>
          )}
          <button onClick={()=>go("book")} style={primaryBtn}>save & go back</button>
        </div>
      </div>
    );
  }

  // ── SERIES ─────────────────────────────────────────────────────────────────
  if (view==="series" && activeSeries) {
    const seriesBooks = books.filter(b=>b.seriesName===activeSeries).sort((a,b)=>(parseFloat(a.seriesNum)||0)-(parseFloat(b.seriesNum)||0));
    const scores = seriesBooks.map(b=>finalScore(b)).filter(v=>v!==null);
    const avgScore = scores.length ? scores.reduce((a,c)=>a+c,0)/scores.length : null;
    const sv = parseFloat(seriesVibes[activeSeries]||"");
    const seriesFinal = avgScore!==null ? Math.min(5,Math.max(1,avgScore+(isNaN(sv)?0:Math.max(-0.5,Math.min(0.5,sv-3))))) : null;

    // Series curve: overlay all books' curves on one graph
    const CURVE_COLORS = ["#8b6f47","#c45880","#4a7a8b","#7a8b4a","#8b4a6f","#4a8b7a"];
    const booksWithCurves = seriesBooks.filter(b=>{ const r=getActiveRead(b); return (r.curve||[]).length>0; });

    const SeriesCurveGraph = () => {
      const [tooltip, setTooltip] = useState(null);
      if (!booksWithCurves.length) return <div style={{ color:C.muted, fontSize:13, textAlign:"center", padding:"16px 0" }}>No reading curves logged yet.</div>;
      const W=500, H=180, pL=30, pR=14, pT=10, pB=32;
      const plotW=W-pL-pR, plotH=H-pT-pB;
      const yTicks=[1,3,5,7,10];
      return (
        <div style={{ position:"relative" }}>
          <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
            {yTicks.map(t=>{ const y=pT+(1-(t-1)/9)*plotH; return (
              <g key={t}>
                <line x1={pL} y1={y} x2={W-pR} y2={y} stroke={C.border} strokeWidth="0.7"/>
                <text x={pL-4} y={y+4} textAnchor="end" fontSize="9" fill={C.muted}>{t}</text>
              </g>
            );})}
            {booksWithCurves.map((b,bi)=>{
              const read = getActiveRead(b);
              const curve = read.curve||[];
              const n = curve.length;
              const color = CURVE_COLORS[bi % CURVE_COLORS.length];
              const pts = curve.map((pt,i)=>({
                x: pL+(n===1?plotW/2:(i/(n-1))*plotW),
                y: pT+(1-(pt.score-1)/(10-1))*plotH,
                ...pt
              }));
              const polyline = pts.map(p=>`${p.x},${p.y}`).join(' ');
              return (
                <g key={b.id}>
                  <polyline points={polyline} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" strokeDasharray={bi===0?"none":"4 2"}/>
                  {pts.map((p,i)=>{
                    const diamond=(cx,cy,r)=>`${cx},${cy-r} ${cx+r},${cy} ${cx},${cy+r} ${cx-r},${cy}`;
                    return <polygon key={i} points={diamond(p.x,p.y,4)} fill={color} style={{cursor:"pointer"}}
                      onMouseEnter={()=>setTooltip({...p,bookTitle:b.title,color})}
                      onMouseLeave={()=>setTooltip(null)}
                      onClick={()=>setTooltip(t=>t?.x===p.x&&t?.bookTitle===b.title?null:{...p,bookTitle:b.title,color})}/>;
                  })}
                </g>
              );
            })}
          </svg>
          {/* Legend */}
          <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginTop:8 }}>
            {booksWithCurves.map((b,bi)=>(
              <div key={b.id} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:C.muted }}>
                <span style={{ width:16, height:2, background:CURVE_COLORS[bi%CURVE_COLORS.length], display:"inline-block", borderRadius:1 }}/>
                {b.title}
              </div>
            ))}
          </div>
          {tooltip && (
            <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", background:C.bg, border:`1px solid ${C.border}`, borderRadius:8, padding:"8px 12px", fontSize:12, color:C.text, pointerEvents:"none", zIndex:10, whiteSpace:"nowrap", boxShadow:"0 2px 12px rgba(0,0,0,0.1)" }}>
              <div style={{ fontWeight:700, color:tooltip.color }}>{tooltip.bookTitle}</div>
              <div style={{ color:C.muted }}>{tooltip.label}</div>
              <div style={{ color:C.accent, fontWeight:600 }}>score: {tooltip.score}</div>
              {tooltip.note && <div style={{ color:C.muted, fontStyle:"italic" }}>{tooltip.note}</div>}
            </div>
          )}
        </div>
      );
    };

    return (
      <div style={pageStyle} className="fade-in">
        <div style={wrapStyle(520)}>
          <button onClick={()=>go("shelf")} style={backBtn}>‹ shelf</button>
          <h2 className="serif" style={{ fontSize:24, color:C.text, margin:"0 0 4px", fontWeight:700 }}>{activeSeries}</h2>
          <div style={{ color:C.muted, fontSize:13, marginBottom:16 }}>{seriesBooks.length} book{seriesBooks.length!==1?"s":""}</div>
          {seriesFinal!==null && (
            <div style={{ textAlign:"center", padding:18, background:C.warm, borderRadius:12, border:`1px solid ${C.border}`, marginBottom:16 }}>
              <div style={{ fontSize:12, color:C.muted, marginBottom:4, letterSpacing:"0.06em", textTransform:"uppercase" }}>series score</div>
              <div className="serif" style={{ fontSize:44, fontWeight:700, color:C.accent }}>{seriesFinal.toFixed(2)}<span style={{ fontSize:15, color:C.muted, fontWeight:400 }}>/5</span></div>
            </div>
          )}

          {/* Series curves overlaid */}
          {booksWithCurves.length > 0 && (
            <div style={{ ...sectionStyle, marginBottom:16 }}>
              <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:10 }}>reading curves across series</div>
              <SeriesCurveGraph/>
            </div>
          )}

          <div style={sectionStyle}>
            <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:8 }}>series vibe</div>
            <div style={{ fontSize:12, color:C.muted, marginBottom:10 }}>How do you feel about this series as a whole — beyond any single book?</div>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <input type="number" min={1} max={5} step={0.01}
                value={seriesVibes[activeSeries]||""}
                onChange={e=>setSeriesVibes(sv=>({...sv,[activeSeries]:e.target.value}))}
                placeholder="1–5"
                style={{ width:90, padding:"7px 10px", borderRadius:7, border:`1px solid ${C.border}`, background:C.bg, color:C.text, fontSize:14, outline:"none" }}/>
              <span style={{ fontSize:12, color:C.muted }}>out of 5</span>
            </div>
          </div>
          <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:12 }}>books in series</div>
          {seriesBooks.map(b=>{
            const fs=finalScore(b);
            return (
              <div key={b.id} onClick={()=>go("book",{id:b.id})} style={{ ...sectionStyle, cursor:"pointer", display:"flex", gap:12, alignItems:"center", marginBottom:10 }}>
                {b.cover
                  ? <img src={b.cover} alt="" style={{ width:48, height:64, objectFit:"cover", borderRadius:6, flexShrink:0 }}/>
                  : <div style={{ width:48, height:64, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}><BookArt size={36}/></div>}
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:10, color:C.muted, marginBottom:2 }}>#{b.seriesNum||"?"}</div>
                  <div className="serif" style={{ fontSize:14, fontWeight:700, color:C.text }}>{b.title}</div>
                  <div style={{ fontSize:11, color:C.muted }}>{b.status}</div>
                  {b.startDate && <div style={{ fontSize:10, color:C.muted }}>started {b.startDate}</div>}
                </div>
                {fs!==null && <div className="serif" style={{ fontSize:20, fontWeight:700, color:C.accent }}>{fs.toFixed(b.decimals||2)}</div>}
              </div>
            );
          })}
          <button onClick={()=>{ setDraft({...emptyBook(),seriesName:activeSeries}); setIsEditing(false); go("add"); }} style={ghostBtn(C.accentL)}>+ add book to this series</button>
        </div>
      </div>
    );
  }

  // ── STATS ──────────────────────────────────────────────────────────────────
  if (view==="stats") {
    const finished = books.filter(b=>b.status==="finished");
    const reading  = books.filter(b=>b.status==="reading");
    const wantTo   = books.filter(b=>b.status==="want to read");
    const dropped  = books.filter(b=>b.status==="dropped");
    const rated    = books.filter(b=>finalScore(b)!==null);
    const sorted   = [...rated].sort((a,b)=>(finalScore(b)||0)-(finalScore(a)||0));
    const genreCounts = {};
    books.forEach(b=>{ if(b.genre) genreCounts[b.genre]=(genreCounts[b.genre]||0)+1; });
    const pillarAvgs = PILLARS.map(p=>{
      const vals=books.map(b=>parseFloat(b.pillars[p.key])).filter(v=>!isNaN(v));
      return { label:p.label, avg:vals.length?vals.reduce((a,c)=>a+c,0)/vals.length:0 };
    });
    const ranges=[[1,2],[2,3],[3,4],[4,5]];
    const dist=ranges.map(([lo,hi])=>({ label:`${lo}–${hi}`, count:rated.filter(b=>{ const s=finalScore(b); return s>=lo&&s<hi; }).length }));
    const maxDist=Math.max(...dist.map(d=>d.count),1);
    const vibeDivergence=rated.reduce((best,b)=>{
      const pa=avgPillars(b),vb=parseFloat(b.vibe);
      if(pa===null||isNaN(vb)) return best;
      const diff=Math.abs(pa-vb);
      return diff>(best?.diff||0)?{book:b,diff,pa,vb}:best;
    },null);
    return (
      <div style={pageStyle} className="fade-in">
        <div style={wrapStyle(520)}>
          <button onClick={()=>go("shelf")} style={backBtn}>‹ shelf</button>
          <h2 className="serif" style={{ fontSize:24, color:C.text, margin:"0 0 20px", fontWeight:700 }}>stats</h2>
          <div style={sectionStyle}>
            <div className="serif" style={{ fontSize:42, fontWeight:700, color:C.accent }}>{finished.length}</div>
            <div style={{ fontSize:14, color:C.muted, marginBottom:14 }}>books finished</div>
            <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
              {[["reading",reading.length],["want to read",wantTo.length],["dropped",dropped.length]].map(([label,count])=>(
                <div key={label} style={{ textAlign:"center" }}>
                  <div className="serif" style={{ fontSize:22, fontWeight:700, color:C.text }}>{count}</div>
                  <div style={{ fontSize:11, color:C.muted }}>{label}</div>
                </div>
              ))}
            </div>
          </div>
          {sorted.length>0 && (
            <div style={sectionStyle}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:600, color:C.text }}>top books</div>
                <div style={{ display:"flex", gap:6 }}>
                  {[5,10].map(n=>(
                    <button key={n} onClick={()=>setTopN(n)}
                      style={{ padding:"4px 10px", borderRadius:20, border:`1px solid ${topN===n?C.accent:C.border}`, background:topN===n?C.accent:"transparent", color:topN===n?C.white:C.muted, fontSize:11, cursor:"pointer" }}>
                      top {n}
                    </button>
                  ))}
                </div>
              </div>
              {sorted.slice(0,topN).map((b,i)=>(
                <div key={b.id} onClick={()=>go("book",{id:b.id})} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${C.border}`, cursor:"pointer" }}>
                  <div>
                    <span style={{ fontSize:12, color:C.muted, marginRight:8 }}>#{i+1}</span>
                    <span className="serif" style={{ fontSize:13, color:C.text, fontWeight:700 }}>{b.title}</span>
                    <span style={{ fontSize:12, color:C.muted }}> — {b.author}</span>
                  </div>
                  <span className="serif" style={{ fontSize:14, fontWeight:700, color:C.accent }}>{finalScore(b)!=null?finalScore(b).toFixed(b.decimals||2):"—"}</span>
                </div>
              ))}
            </div>
          )}
          {rated.length>0 && (
            <div style={sectionStyle}>
              <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:12 }}>rating distribution</div>
              {dist.map(d=>(
                <div key={d.label} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <span style={{ fontSize:11, color:C.muted, width:36 }}>{d.label}</span>
                  <div style={{ flex:1, height:14, background:C.border, borderRadius:7, overflow:"hidden" }}>
                    <div style={{ width:`${(d.count/maxDist)*100}%`, height:"100%", background:C.accent, borderRadius:7 }}/>
                  </div>
                  <span style={{ fontSize:11, color:C.muted, width:16 }}>{d.count}</span>
                </div>
              ))}
            </div>
          )}
          {Object.keys(genreCounts).length>0 && (
            <div style={sectionStyle}>
              <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:10 }}>genres</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {Object.entries(genreCounts).map(([g,n])=>(
                  <span key={g} style={{ fontSize:12, color:C.accent, background:C.bg, border:`1px solid ${C.accentL}`, borderRadius:20, padding:"3px 10px" }}>{g} <span style={{ color:C.muted }}>({n})</span></span>
                ))}
              </div>
            </div>
          )}
          {rated.length>0 && (
            <div style={sectionStyle}>
              <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:12 }}>pillar averages</div>
              {pillarAvgs.map(p=>(
                <div key={p.label} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                  <span style={{ fontSize:12, color:C.muted, width:72 }}>{p.label}</span>
                  <div style={{ flex:1, height:10, background:C.border, borderRadius:5, overflow:"hidden" }}>
                    <div style={{ width:`${(p.avg/5)*100}%`, height:"100%", background:C.accentL, borderRadius:5 }}/>
                  </div>
                  <span style={{ fontSize:12, color:C.accent, fontWeight:600, width:32 }}>{p.avg?p.avg.toFixed(1):"—"}</span>
                </div>
              ))}
            </div>
          )}
          {vibeDivergence && (
            <div style={{ ...sectionStyle, borderLeft:`3px solid ${C.accentL}` }}>
              <div style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:6 }}>vibe divergence</div>
              <div style={{ fontSize:12, color:C.muted, marginBottom:6 }}>The book where your gut felt most differently from the math:</div>
              <div className="serif" style={{ fontSize:16, fontWeight:700, color:C.text }}>{vibeDivergence.book.title}</div>
              <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>
                Pillar avg: <span style={{ color:C.accent, fontWeight:600 }}>{vibeDivergence.pa.toFixed(2)}</span>
                {" · "}Vibe: <span style={{ color:C.accent, fontWeight:600 }}>{vibeDivergence.vb.toFixed(2)}</span>
                {" · "}Diff: <span style={{ color:C.amber, fontWeight:600 }}>{vibeDivergence.diff.toFixed(2)}</span>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- PWA Manifest inline -->

  const manifest = {
    name: "My Shelf",
    short_name: "My Shelf",
    description: "Your personal book journal",
    start_url: ".",
    display: "standalone",
    background_color: "#faf7f2",
    theme_color: "#8b6f47",
    icons: [{
      src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%238b6f47'/><rect x='8' y='36' width='48' height='10' rx='2.5' fill='%23c4a882'/><rect x='12' y='24' width='40' height='10' rx='2.5' fill='%23faf7f2' opacity='.85'/><rect x='16' y='12' width='32' height='10' rx='2.5' fill='%23fff'/><path d='M46 12 L46 22 L43 19 L40 22 L40 12 Z' fill='%238b6f47'/></svg>`),
      sizes: "192x192",
      type: "image/svg+xml",
      purpose: "any maskable"
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
})();

// Service Worker (cache-first for offline)
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'myshelf-v3';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.href])));
